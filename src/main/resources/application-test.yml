# Test profile overrides. Activated by Surefire (spring.profiles.active=test) so any
# @SpringBootTest picks them up automatically — no @ActiveProfiles annotations needed.
# DataSource is provided by Testcontainers (Docker-managed Postgres per JVM).

spring:
  datasource:
    url: jdbc:tc:postgresql:15-alpine:///challenge_test?TC_DAEMON=true
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test

  jpa:
    hibernate:
      ddl-auto: validate                        # entities must match the DDL applied by sql.init
    properties:
      hibernate:
        default_schema: document_schema         # aligned with prod; created by schema-init.sql

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-init.sql
      continue-on-error: false

app:
  minio:
    endpoint: http://localhost:9000
    public-endpoint: http://localhost:9000
    access-key: testaccess
    secret-key: testsecretkey1234
    bucket: test-bucket
    presigned:
      ttl-seconds: 600
  upload:
    max-size-bytes: 1048576                     # 1 MB cap for unit/slice tests
    enforce-pdf-magic: false

logging:
  level:
    root: WARN
    com.clara.ops.challenge: INFO
    org.testcontainers: INFO
